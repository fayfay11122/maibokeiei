<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>maibokeiei</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mali:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Mali', cursive;
}

body{
  overflow:hidden;
  background:#f9f1eb;
  color:#6b4f3b;
  position:relative;
}

/* EMOJI BACKGROUND */
.floating{
  position:absolute;
  top:-50px;
  font-size:25px;
  opacity:0.6;
  animation:fall linear infinite;
  z-index:0;
  pointer-events:none;
}

@keyframes fall{
  0%{
    transform:translateY(-10vh) rotate(0deg);
  }

  100%{
    transform:translateY(110vh) rotate(360deg);
  }
}

.page{
  width:100%;
  height:100vh;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  position:relative;
  z-index:2;
}

.active{
  display:flex;
}

h1{
  font-size:3rem;
  margin-bottom:20px;
  color:#6b4f3b;
  text-shadow:0 0 10px rgba(255,255,255,0.5);
}

p{
  font-size:1.2rem;
  margin-bottom:20px;
  max-width:700px;
  line-height:1.8;
}

button{
  padding:15px 35px;
  border:none;
  border-radius:40px;
  background:#8b6b52;
  color:#fffaf5;
  font-size:1.2rem;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
  box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

button:hover{
  transform:scale(1.1);
}

.music-link{
  text-decoration:none;
  color:#fffaf5;
  background:#a98467;

  padding:12px 24px;

  border-radius:30px;

  font-size:1rem;

  transition:0.3s;

  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.music-link:hover{
  transform:scale(1.05);
  background:#8b6b52;
}

canvas{
  background:rgba(255,255,255,0.25);
  border:4px solid rgba(255,255,255,0.5);
  border-radius:20px;
  margin-top:20px;
}

#score{
  font-size:1.5rem;
  margin-top:15px;
}

.love{
  font-size:5rem;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page active" id="page1">

  <h1>เค้ามีอะไรจะบอก𐔌՞. .՞𐦯</h1>

  <button onclick="nextPage(2)">กดดูสิ</button>

  <br><br>

  <a 
    href="https://www.youtube.com/watch?v=e9ZjFpXyoGA"
    target="_blank"
    class="music-link"
  >
    เปิดเพลงก่อนฟังตรงนี้
  </a>

</div>

<!-- PAGE 2 -->
<div class="page" id="page2">

  <h1>เกมงูหัวใจ</h1>

  <p>กินหัวใจให้ครบ 10 ดวง</p>

  <div id="score">คะแนน: 0 / 10</div>

  <canvas id="game" width="400" height="400"></canvas>

</div>

<!-- PAGE 3 -->
<div class="page" id="page3">

  <div class="love">💖</div>

  <h1>เป็นแฟนกันนะ</h1>

  <p>
    เค้ารู้สึกว่าเค้าอยากมีน้ำอยู่ในทุกๆช่วงเวลา มันทำให้เค้ารู้สึกดีมากๆๆ  เค้าจะตั้งใจซัพพอร์ทน้ำแบบนี้้ไปเรื่อยๆ เค้ารักน้ำนะ 
  </p>

</div>

<script>

/* FLOATING EMOJIS */

const emojis = ["🤎","☁️","🧸","✨","🤍"];

for(let i = 0; i < 30; i++){

  const float = document.createElement("div");

  float.classList.add("floating");

  float.innerHTML =
    emojis[Math.floor(Math.random() * emojis.length)];

  float.style.left = Math.random() * 100 + "vw";

  float.style.animationDuration =
    (Math.random() * 5 + 6) + "s";

  float.style.fontSize =
    (Math.random() * 20 + 18) + "px";

  float.style.opacity =
    Math.random() * 0.5 + 0.2;

  float.style.animationDelay =
    Math.random() * 5 + "s";

  document.body.appendChild(float);
}

/* PAGE CHANGE */

function nextPage(pageNumber){

  document.querySelectorAll(".page").forEach(page=>{
    page.classList.remove("active");
  });

  document.getElementById("page"+pageNumber).classList.add("active");

  if(pageNumber === 2){
    startGame();
  }
}

/* SNAKE GAME */

function startGame(){

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  const box = 20;

  let snake = [
    {x:9 * box, y:10 * box}
  ];

  let direction = "RIGHT";

  let food = {
    x: Math.floor(Math.random()*19) * box,
    y: Math.floor(Math.random()*19) * box
  };

  let score = 0;

  document.addEventListener("keydown", changeDirection);

  function changeDirection(event){

    if(event.key === "ArrowLeft" && direction !== "RIGHT"){
      direction = "LEFT";
    }
    else if(event.key === "ArrowUp" && direction !== "DOWN"){
      direction = "UP";
    }
    else if(event.key === "ArrowRight" && direction !== "LEFT"){
      direction = "RIGHT";
    }
    else if(event.key === "ArrowDown" && direction !== "UP"){
      direction = "DOWN";
    }
  }

  function draw(){

    ctx.clearRect(0,0,400,400);

    // FOOD
    ctx.font = "20px Arial";
    ctx.fillText("💖", food.x, food.y + 18);

    // SNAKE
    for(let i=0;i<snake.length;i++){

      ctx.fillStyle = i === 0 ? "#8b6b52" : "#b08968";

      ctx.fillRect(snake[i].x, snake[i].y, box, box);

      ctx.strokeStyle = "#fff";
      ctx.strokeRect(snake[i].x, snake[i].y, box, box);
    }

    let snakeX = snake[0].x;
    let snakeY = snake[0].y;

    if(direction === "LEFT") snakeX -= box;
    if(direction === "UP") snakeY -= box;
    if(direction === "RIGHT") snakeX += box;
    if(direction === "DOWN") snakeY += box;

    // EAT FOOD
    if(snakeX === food.x && snakeY === food.y){

      score++;

      document.getElementById("score").innerHTML =
        "คะแนน: " + score + " / 10";

      food = {
        x: Math.floor(Math.random()*19) * box,
        y: Math.floor(Math.random()*19) * box
      };

      // WIN
      if(score >= 10){
        clearInterval(game);
        nextPage(3);
      }

    }else{
      snake.pop();
    }

    let newHead = {
      x: snakeX,
      y: snakeY
    };

    // COLLISION
    if(
      snakeX < 0 ||
      snakeY < 0 ||
      snakeX >= 400 ||
      snakeY >= 400 ||
      collision(newHead,snake)
    ){
      clearInterval(game);

      alert("แพ้แล้วว ลองใหม่อีกที 💔");

      location.reload();
    }

    snake.unshift(newHead);
  }

  function collision(head,array){

    for(let i=0;i<array.length;i++){

      if(head.x === array[i].x &&
         head.y === array[i].y){

        return true;
      }
    }

    return false;
  }

  const game = setInterval(draw,120);
}

</script>

</body>
</html>
